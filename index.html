<!DOCTYPE html>
<html>
<head>
    <title>Low-Bandwidth Video Call</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; background: #1a1a2e; color: white; text-align: center; margin: 0; padding: 20px; }
        #roomControl { margin-bottom: 20px; }
        input, button { padding: 12px; margin: 5px; font-size: 16px; border-radius: 8px; border: none; }
        button { background: #0f3460; color: white; cursor: pointer; }
        button:hover { background: #16213e; }
        #videosContainer { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        video { width: 300px; background: black; margin: 5px; border-radius: 12px; transform: scaleX(-1); }
        .controls { margin-top: 20px; }
        .controls button { background: #e94560; }
        .status { font-size: 14px; margin-top: 15px; color: #aaa; }
        @media (max-width: 700px) { video { width: 200px; } }
    </style>
</head>
<body>
    <h2>📡 Low-Bandwidth Video Call</h2>
    <div id="roomControl">
        <input type="text" id="roomName" placeholder="Room name" value="myroom">
        <button id="joinBtn">Join / Create Room</button>
        <button id="leaveBtn" disabled>Leave Call</button>
    </div>
    <div id="videosContainer"></div>
    <div class="controls">
        <button id="muteAudioBtn">🔇 Mute Mic</button>
        <button id="muteVideoBtn">📷 Stop Video</button>
    </div>
    <div class="status" id="status">Not connected. Enter room name and click Join.</div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script>
        // ========== REPLACE WITH YOUR FIREBASE CONFIG ==========
        const firebaseConfig = {
          apiKey: "AIzaSyD6oFRc1zChwlmDEQQTixwBbo6cJ-A9e9M",
          authDomain: "videosite-426c1.firebaseapp.com",
          projectId: "videosite-426c1",
          storageBucket: "videosite-426c1.firebasestorage.app",
          messagingSenderId: "112937784499",
          appId: "1:112937784499:web:24e6bd8e1549f0eadd8cc6"
        };
        // ======================================================

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let localStream = null;
        let peers = new Map();  // userId -> { pc, polite }
        let roomRef = null;
        let myId = null;
        let isInCall = false;

        // DOM elements
        const roomNameInput = document.getElementById('roomName');
        const joinBtn = document.getElementById('joinBtn');
        const leaveBtn = document.getElementById('leaveBtn');
        const muteAudioBtn = document.getElementById('muteAudioBtn');
        const muteVideoBtn = document.getElementById('muteVideoBtn');
        const videosContainer = document.getElementById('videosContainer');
        const statusDiv = document.getElementById('status');

        function setStatus(msg) { statusDiv.innerText = msg; console.log(msg); }

        function addVideoElement(userId, isLocal = false) {
            let videoId = isLocal ? 'localVideo' : `video_${userId}`;
            if (document.getElementById(videoId)) return document.getElementById(videoId);
            const video = document.createElement('video');
            video.id = videoId;
            video.autoplay = true;
            video.playsInline = true;
            video.muted = isLocal;
            if (isLocal) video.style.border = "2px solid green";
            videosContainer.appendChild(video);
            return video;
        }

        function removeVideoElement(userId) {
            const el = document.getElementById(`video_${userId}`);
            if (el) el.remove();
        }

        async function getLocalStream() {
            try {
                // Low-bandwidth constraints
                const constraints = {
                    audio: true,
                    video: {
                        width: { ideal: 320, max: 640 },
                        height: { ideal: 240, max: 480 },
                        frameRate: { ideal: 15, max: 20 }
                    }
                };
                return await navigator.mediaDevices.getUserMedia(constraints);
            } catch (err) {
                setStatus("Camera/mic access denied. Audio only.");
                return await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            }
        }

        async function createPeerConnection(userId, polite) {
            const pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            });

            if (localStream) {
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            }

            pc.ontrack = (event) => {
                const videoEl = addVideoElement(userId, false);
                videoEl.srcObject = event.streams[0];
                setStatus(`Receiving video from ${userId}`);
            };

            pc.onicecandidate = (event) => {
                if (event.candidate && roomRef) {
                    // Store candidate in Firebase, separate from the main signaling
                    roomRef.child('candidates').child(userId).push({
                        candidate: event.candidate,
                        from: myId
                    });
                }
            };

            pc.oniceconnectionstatechange = () => {
                if (pc.iceConnectionState === 'connected') {
                    setStatus(`Connected to ${userId}`);
                } else if (pc.iceConnectionState === 'failed') {
                    setStatus(`Connection to ${userId} failed. Try turning off video.`);
                }
            };

            // ----- Polite negotiation handling (prevents collisions) -----
            let makingOffer = false;
            let ignoreOffer = false;

            pc.onnegotiationneeded = async () => {
                try {
                    makingOffer = true;
                    await pc.setLocalDescription(await pc.createOffer());
                    // Send offer to the specific peer via Firebase
                    await roomRef.child('offers').child(userId).set({
                        from: myId,
                        sdp: pc.localDescription
                    });
                } catch (err) {
                    console.error("Negotiation needed error", err);
                } finally {
                    makingOffer = false;
                }
            };

            // Listen for remote offers on this peer's dedicated path
            const offerRef = roomRef.child('offers').child(userId);
            const onOffer = async (snap) => {
                const data = snap.val();
                if (!data || data.from === myId) return;
                // If we are polite and already making an offer or signaling busy, ignore this offer
                if (polite && (makingOffer || pc.signalingState !== 'stable')) {
                    ignoreOffer = true;
                    return;
                }
                try {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                    if (pc.remoteDescription.type === 'offer') {
                        await pc.setLocalDescription(await pc.createAnswer());
                        await roomRef.child('answers').child(userId).set({
                            from: myId,
                            sdp: pc.localDescription
                        });
                    }
                } catch (err) {
                    console.error("Offer handling error", err);
                } finally {
                    ignoreOffer = false;
                }
            };
            offerRef.on('value', onOffer);

            // Listen for remote answers
            const answerRef = roomRef.child('answers').child(userId);
            const onAnswer = async (snap) => {
                const data = snap.val();
                if (!data || data.from === myId) return;
                if (pc.signalingState === 'have-local-offer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                }
                // Clean up answer after using
                snap.ref.remove();
            };
            answerRef.on('value', onAnswer);

            // Listen for ICE candidates for this peer
            const candidateRef = roomRef.child('candidates').child(userId);
            const onCandidate = async (snap) => {
                const data = snap.val();
                if (!data || data.from === myId) return;
                if (data.candidate) {
                    try {
                        // Ensure candidate has proper sdpMid/sdpMLineIndex (fallback if missing)
                        const candidate = new RTCIceCandidate(data.candidate);
                        await pc.addIceCandidate(candidate);
                    } catch (err) {
                        console.warn("Failed to add ICE candidate", err);
                    }
                }
                snap.ref.remove(); // remove after use
            };
            candidateRef.on('child_added', onCandidate);

            // Store cleanup functions on the pc object so we can remove listeners later
            pc._cleanup = () => {
                offerRef.off('value', onOffer);
                answerRef.off('value', onAnswer);
                candidateRef.off('child_added', onCandidate);
            };

            return pc;
        }

        async function joinRoom() {
            if (isInCall) await leaveRoom();
            const roomName = roomNameInput.value.trim();
            if (!roomName) return;

            setStatus("Getting camera/mic...");
            try {
                localStream = await getLocalStream();
                addVideoElement('local', true).srcObject = localStream;
            } catch (e) {
                setStatus("Cannot access media devices.");
                return;
            }

            myId = Math.random().toString(36).substring(2, 10);
            roomRef = db.ref(`rooms/${roomName}`);
            setStatus("Joining room...");

            // Register myself in participants list
            await roomRef.child('participants').child(myId).set(true);
            // When someone leaves
            roomRef.child('participants').on('child_removed', (snap) => {
                const peerId = snap.key;
                if (peerId !== myId && peers.has(peerId)) {
                    const peer = peers.get(peerId);
                    peer.pc.close();
                    if (peer.pc._cleanup) peer.pc._cleanup();
                    peers.delete(peerId);
                    removeVideoElement(peerId);
                    setStatus(`${peerId} left the call.`);
                }
            });

            // When a new participant joins
            roomRef.child('participants').on('child_added', async (snap) => {
                const peerId = snap.key;
                if (peerId === myId) return;
                if (!peers.has(peerId)) {
                    setStatus(`New user ${peerId} joined. Connecting...`);
                    const polite = (myId < peerId); // lexical ordering to decide who is polite
                    const pc = await createPeerConnection(peerId, polite);
                    peers.set(peerId, { pc, polite });
                    // Trigger initial negotiation if stable
                    if (pc.signalingState === 'stable') {
                        pc.onnegotiationneeded();
                    }
                }
            });

            isInCall = true;
            joinBtn.disabled = true;
            leaveBtn.disabled = false;
            setStatus(`In room "${roomName}". Share this room name with others.`);
        }

        async function leaveRoom() {
            if (roomRef) {
                await roomRef.child('participants').child(myId).remove();
                roomRef.off(); // remove all listeners
                roomRef = null;
            }
            for (let [peerId, peer] of peers.entries()) {
                peer.pc.close();
                if (peer.pc._cleanup) peer.pc._cleanup();
                removeVideoElement(peerId);
            }
            peers.clear();
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            const localVid = document.getElementById('localVideo');
            if (localVid) localVid.remove();
            isInCall = false;
            joinBtn.disabled = false;
            leaveBtn.disabled = true;
            setStatus("Left the call. Refresh if issues persist.");
        }

        function toggleAudio() {
            if (localStream) {
                const audio = localStream.getAudioTracks()[0];
                if (audio) {
                    audio.enabled = !audio.enabled;
                    muteAudioBtn.innerText = audio.enabled ? "🔇 Mute Mic" : "🎤 Unmute";
                }
            }
        }

        function toggleVideo() {
            if (localStream) {
                const video = localStream.getVideoTracks()[0];
                if (video) {
                    video.enabled = !video.enabled;
                    muteVideoBtn.innerText = video.enabled ? "📷 Stop Video" : "🎥 Start Video";
                    setStatus(video.enabled ? "Video on (uses more bandwidth)" : "Video off - better for poor Wi-Fi");
                }
            }
        }

        joinBtn.onclick = joinRoom;
        leaveBtn.onclick = leaveRoom;
        muteAudioBtn.onclick = toggleAudio;
        muteVideoBtn.onclick = toggleVideo;
    </script>
</body>
</html>
